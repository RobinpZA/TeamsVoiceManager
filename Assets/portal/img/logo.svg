<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="TeamsVoiceManager">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="#181825"/>
  <!-- Headset body -->
  <path d="M12 24 C12 16.268 17.373 10 24 10 C30.627 10 36 16.268 36 24"
        fill="none" stroke="#89b4fa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left ear cup -->
  <rect x="9" y="22" width="6" height="9" rx="3" fill="#89b4fa"/>
  <!-- Right ear cup -->
  <rect x="33" y="22" width="6" height="9" rx="3" fill="#89b4fa"/>
  <!-- Mic arm -->
  <path d="M15 31 Q15 38 21 38" fill="none" stroke="#89b4fa" stroke-width="2"
        stroke-linecap="round"/>
  <!-- Mic capsule -->
  <circle cx="21" cy="38" r="2" fill="#a6e3a1"/>
  <!-- Sound wave dots -->
  <circle cx="28" cy="24" r="1.2" fill="#89b4fa" opacity="0.6"/>
  <circle cx="31.5" cy="24" r="1.2" fill="#89b4fa" opacity="0.4"/>
  <circle cx="35" cy="24" r="1.2" fill="#89b4fa" opacity="0.2"/>
</svg>
